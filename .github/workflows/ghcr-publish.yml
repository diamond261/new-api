name: Publish to GHCR (diamond261/new-api)

# Builds and publishes a multi-arch Docker image to GHCR every time `main`
# advances or a version tag is pushed to https://github.com/diamond261/new-api
#
# Tags produced (image: ghcr.io/diamond261/new-api):
#   - push to main:    `main` + `sha-<short>` + `latest`
#   - push to v*.*.*:  `<tag>` + `latest`
#
# Requires no extra secrets — uses the built-in GITHUB_TOKEN to log in to ghcr.

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: ghcr-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push (ghcr.io/diamond261/new-api)
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
          else
            VER="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          fi
          echo "VERSION=${VER}" >> "$GITHUB_ENV"
          # Stamp VERSION so the in-binary version reflects the build.
          echo "${VER}" > VERSION
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/diamond261/new-api
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Summary
        run: |
          {
            echo "### Published image"
            echo
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo
            echo "digest: ${{ steps.build.outputs.digest }}"
            echo "version: ${{ steps.version.outputs.version }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # On a version tag: create a proper release with notes.
      # On main push: upsert a rolling "latest-build" pre-release so the
      # dashboard's "Check for updates" button always finds something.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && steps.version.outputs.version || 'latest-build' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && steps.version.outputs.version || 'Latest Build' }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') || contains(steps.version.outputs.version, '-rc') || contains(steps.version.outputs.version, '-beta') || contains(steps.version.outputs.version, '-alpha') }}
          body: |
            Docker image: `ghcr.io/diamond261/new-api:${{ steps.version.outputs.version }}`

            ```
            docker pull ghcr.io/diamond261/new-api:${{ steps.version.outputs.version }}
            ```
